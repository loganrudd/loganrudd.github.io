<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16181d"/>
      <stop offset="100%" stop-color="#101010"/>
    </linearGradient>
    <linearGradient id="scrim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#101010" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>

  <g stroke="#232427" stroke-width="1">
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
  </g>

  <!-- left half: physics — particle track curving in a field -->
  <g fill="none" stroke="#C19CD8" stroke-width="2" opacity="0.9">
    <path d="M120,470 C 220,430 260,360 240,300 C 220,240 280,210 340,230"/>
    <path d="M140,490 C 230,455 270,390 250,335 C 232,280 288,255 345,272" opacity="0.5"/>
  </g>
  <circle cx="340" cy="230" r="4" fill="#C19CD8"/>
  <circle cx="120" cy="470" r="4" fill="#C19CD8"/>

  <!-- detector rings -->
  <circle cx="300" cy="330" r="140" fill="none" stroke="#3E4250" stroke-width="1.5" opacity="0.7"/>
  <circle cx="300" cy="330" r="90" fill="none" stroke="#3E4250" stroke-width="1.5" opacity="0.5"/>

  <!-- right half: ML — neural node grid -->
  <g fill="#1ABC9C">
    <circle cx="820" cy="220" r="5"/>
    <circle cx="820" cy="290" r="5"/>
    <circle cx="820" cy="360" r="5"/>
    <circle cx="820" cy="430" r="5"/>

    <circle cx="960" cy="255" r="5"/>
    <circle cx="960" cy="325" r="5"/>
    <circle cx="960" cy="395" r="5"/>

    <circle cx="1080" cy="300" r="6" fill="#C9D3E7"/>
    <circle cx="1080" cy="380" r="6" fill="#C9D3E7"/>
  </g>
  <g stroke="#707890" stroke-width="1" opacity="0.45">
    <line x1="820" y1="220" x2="960" y2="255"/>
    <line x1="820" y1="220" x2="960" y2="325"/>
    <line x1="820" y1="290" x2="960" y2="255"/>
    <line x1="820" y1="290" x2="960" y2="325"/>
    <line x1="820" y1="360" x2="960" y2="325"/>
    <line x1="820" y1="360" x2="960" y2="395"/>
    <line x1="820" y1="430" x2="960" y2="395"/>
    <line x1="960" y1="255" x2="1080" y2="300"/>
    <line x1="960" y1="325" x2="1080" y2="300"/>
    <line x1="960" y1="325" x2="1080" y2="380"/>
    <line x1="960" y1="395" x2="1080" y2="380"/>
  </g>

  <!-- a connective thread across the midline, tying the two halves -->
  <path d="M340,300 C 500,260 620,340 720,300" stroke="#C9D3E7" stroke-width="1.5" fill="none" stroke-dasharray="3 5" opacity="0.5"/>

  <rect width="1200" height="600" fill="url(#scrim)"/>
</svg>
